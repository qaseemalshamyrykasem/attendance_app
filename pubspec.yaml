name: attendance_admin
description: نظام حضور ذكي - واجهة الإدارة (Offline Attendance System Admin)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.1.0

  # Database - Drift (SQLite)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # HTTP Server & Client
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_cors_headers: ^0.1.1
  http: ^1.1.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.0

  # Network
  connectivity_plus: ^7.0.0
  network_info_plus: ^7.0.0

  # Permissions
  permission_handler: ^11.3.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.2

  # Security
  crypto: ^3.0.3
  encrypt: ^5.0.1
  local_auth: ^2.2.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0

  # Excel/PDF Export
  excel: ^4.0.6
  pdf: ^3.10.7
  printing: ^5.12.0
  open_filex: ^4.0.2
  file_picker: ^8.0.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_vector_icons: ^2.0.0

  # Utils
  logger: ^2.0.2+1
  intl: ^0.20.2
  uuid: ^4.2.2
  url_launcher: ^6.2.2

  # Charts
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
